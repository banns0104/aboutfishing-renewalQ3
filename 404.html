<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어바웃피싱 — 페이지를 찾을 수 없음</title>
<meta http-equiv="refresh" content="2;url=./">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#E8E8E8; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
    color:#191919; letter-spacing:-0.02em;
    padding:24px;
  }
  .card {
    max-width:420px; width:100%; text-align:center;
    background:#fff; border-radius:24px; padding:48px 32px;
    box-shadow:0 8px 32px rgba(0,0,0,0.08);
  }
  .num { font-weight:900; font-size:56px; color:#3182F6; letter-spacing:-0.06em; line-height:1; }
  h1 { font-weight:800; font-size:20px; margin-top:16px; letter-spacing:-0.04em; }
  p { font-size:14px; color:#888; margin-top:8px; line-height:1.55; }
  a {
    display:inline-block; margin-top:24px;
    padding:12px 24px; background:#191919; color:#fff;
    border-radius:9999px; text-decoration:none;
    font-weight:700; font-size:14px;
  }
  a:hover { background:#000; }
</style>
</head>
<body>
<div class="card">
  <div class="num">404</div>
  <h1>페이지를 찾을 수 없어요</h1>
  <p>2초 후 자동으로 프로토타입으로 이동합니다.</p>
  <a href="./">바로 이동하기</a>
</div>
</body></html>
